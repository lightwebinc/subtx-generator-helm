name: release

# Manual, gated release. No automated tag-based trigger.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RELEASE to publish chart to GH Pages and OCI registry'
        required: true

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  release:
    if: github.event.inputs.confirm == 'RELEASE'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package + push chart to OCI
        run: |
          helm package .
          for tgz in *.tgz; do
            helm push "$tgz" oci://ghcr.io/lightwebinc/charts
          done
