apiVersion: v2
name: subtx-generator
description: Load and control-frame generator for the BSV multicast pipeline
type: application
version: 0.2.2
# appVersion MUST equal a tag published on ghcr.io/lightwebinc/subtx-generator
# (the chart's tag:"" default pulls this). Images are published manually via the
# binary repo's image-publish.yml workflow; bump appVersion ONLY in lockstep with
# an image publish — binary git tags are NOT image tags until published.
appVersion: "0.2.3"
kubeVersion: ">= 1.27.0-0"
keywords:
  - bitcoin
  - bsv
  - multicast
  - load-test
  - brc-124
  - brc-127
  - brc-131
  - brc-132
  - brc-134
home: https://github.com/lightwebinc/subtx-generator
sources:
  - https://github.com/lightwebinc/subtx-generator
  - https://github.com/lightwebinc/subtx-generator-helm
maintainers:
  - name: lightwebinc
    url: https://github.com/lightwebinc
icon: https://raw.githubusercontent.com/lightwebinc/bsv-multicast/main/.assets/icon.png
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/changes: |
    - kind: added
      description: Initial chart scaffold
